# EIF v3 - MULTI_CRITIC IVD Intent Artifact
# ==============================================================================
# Purpose:  Close scientific method gap S5 - Multi-Agent Parametric Diversity.
#           EIF's CHALLENGE phase currently generates a protocol for a critic
#           but draws from the same parametric well as the generator (same model
#           family, same training distribution). Genuine adversarial challenge
#           requires a critic with independent priors.
#
# Gap found: Market audit 2026-05-08 - S5 gap confirmed as PARTIALLY OPEN
#            "A single LLM acting as both generator and critic draws from the
#            same parametric well. It cannot genuinely disagree with itself."
# Research:  See research_citations below (EvoScientist, AI Co-Scientist, CONSENSAGENT)
# ==============================================================================

id: eif-multi-critic-v1
version: "1.0"
created: "2026-05-08"
status: implemented  # multi_critic.py fully implemented (tournament mode, adversarial prompts, cross-family routing) as of 2026-05-15

# ─────────────────────────────────────────────────────────────────────────────
# PROBLEM STATEMENT
# ─────────────────────────────────────────────────────────────────────────────

problem:
  title: "EIF CHALLENGE phase generates a protocol but does not call an independent critic model"
  area: "S5 - Multi-Agent Parametric Diversity"
  discovered_in: "Market research cross-check 2026-05-08 - S5 PARTIALLY OPEN"
  evidence_of_absence: >
    challenge/protocol.py returns a ChallengeResult with self_evaluation_flag=True
    when no critic model is specified (the production default). The CHALLENGE
    phase in all 11 corpus scenarios (S4–S11) called build_challenge_result()
    without a critic - meaning CHALLENGE was a protocol document, not a real
    adversarial call. The independence field shows "NONE" in all provenance records.
    CONSENSAGENT (ACL 2025 Findings) shows that same-model critique produces
    near-zero genuine disagreement vs cross-family critics; precise agreement
    rates unconfirmed - see OI1 in eif_v2_intent.yaml.
  research_citations:
    - "CONSENSAGENT (ACL 2025 Findings) - inter-agent sycophancy in debate; same-model critics show markedly higher agreement rates with the generator than cross-family critics do; precise percentages to be confirmed from the paper (see OI1, eif_v2_intent.yaml)"
    - "EvoScientist (arXiv:2603.08127, 2026) - evolving scientist agents achieve breakthrough by using diverse model populations"
    - "AI Co-Scientist (arXiv:2502.18864, Google Research 2025) - generator/verifier split with different model objectives"
    - "POPPER framework (arXiv:2502.09858, 2025) - Type-I error control requires independent falsification agent"
    - "Turpin et al. NeurIPS 2023 (arXiv:2305.04388) - unfaithful CoT; critic using same weights cannot detect backward-rationalization"

# ─────────────────────────────────────────────────────────────────────────────
# SOLUTION
# ─────────────────────────────────────────────────────────────────────────────

solution:
  name: "MULTI_CRITIC module - actual LLM challenge call with independence classification"
  position_in_pipeline: "replaces the protocol-only path in CHALLENGE phase"
  rationale: >
    Rather than generating a critique protocol that no agent executes, the
    multi_critic module makes a real LLM call with an adversarially-tuned
    system prompt (DIFFERENT_OBJECTIVE tier) and, when a cross-family model
    is available in the environment, routes to it (DIFFERENT_FAMILY tier).
  independence_tiers:
    DIFFERENT_FAMILY: "Critic is from a different model family (GPT vs Claude vs Gemini)"
    DIFFERENT_OBJECTIVE: >
      Same base model but explicitly prompted with adversarial red-team objectives:
      'Your only goal is to find flaws. Do not validate. Do not hedge. Return
      every counter-argument regardless of how small.' Classified via
      _OBJECTIVE_MARKERS in diversity.py ('adversarial', 'red-team', 'flaw').
      CONSENSAGENT (ACL 2025 Findings) shows substantially higher disagreement
      rates for adversarially-prompted same-model critics vs same-prompt
      same-model critics; precise percentages subject to OI1 verification.
    DIFFERENT_INFERENCE: "Self-consistency sampling (existing tier, not new)"
    NONE: "Protocol-only fallback - self_evaluation_flag=True (old behavior)"
  critic_selection: >
    run_multi_critic_challenge() always emits DIFFERENT_OBJECTIVE as the
    independence tier, even when OPENAI_CRITIC_MODEL env var is set.
    Reason: the independence_label passed to classify_independence always has
    _ADVERSARIAL_SUFFIX ("-adversarial-critic") appended (multi_critic.py
    _select_critic_model). The "adversarial" substring matches _OBJECTIVE_MARKERS
    before family classification runs, so the result is always DIFFERENT_OBJECTIVE.
    DIFFERENT_FAMILY is only reachable if a future caller strips the suffix and
    passes a bare cross-family model name directly to classify_independence.
    The MC2 contract ("DIFFERENT_FAMILY or DIFFERENT_OBJECTIVE") is satisfied.
  output: >
    ChallengeResult with:
    - critic_independence = DIFFERENT_FAMILY or DIFFERENT_OBJECTIVE (not NONE)
    - self_evaluation_flag = False
    - counter_evidence populated from real LLM response (not empty list)
    - verdict = SURVIVES | NEEDS_REVISION | DEFEATED

# ─────────────────────────────────────────────────────────────────────────────
# CONSTRAINTS (IVD Rule 3 - each must have a test)
# ─────────────────────────────────────────────────────────────────────────────

constraints:
  - id: MC1
    precondition: "OPENAI_API_KEY is set and tournament path is selected (counter_evidence not supplied)"
    description: >
      run_multi_critic_challenge() must return a ChallengeResult with
      self_evaluation_flag=False - it must call an LLM, not return a
      protocol-only stub.
      When OPENAI_API_KEY is absent or counter_evidence is supplied, eif_challenge
      falls back to the protocol path (NONE independence, self_evaluation_flag=True) - 
      MC1 does not apply to that path.
    test: >
      Validation S13: for each tested claim (API key present, tournament path), assert result.self_evaluation_flag == False.

  - id: MC2
    precondition: "OPENAI_API_KEY is set and tournament path is selected (counter_evidence not supplied)"
    description: >
      critic_independence must be DIFFERENT_FAMILY or DIFFERENT_OBJECTIVE - 
      never NONE - when run_multi_critic_challenge() is called on the tournament path.
      Protocol path (no API key or counter_evidence supplied) returns NONE; this is expected.
    test: >
      Validation S13: assert result.critic_independence in
      {"DIFFERENT_FAMILY", "DIFFERENT_OBJECTIVE"} for every challenge result.

  - id: MC3
    enforcement: VALIDATION_ONLY
    description: >
      For at least 50% of HIGH-consequence claims challenged, the multi-critic
      must return at least one counter_evidence item (genuine disagreement, not
      just "no counter-evidence found"). The old protocol-only path returned
      empty lists 100% of the time.
    rationale: >
      Internal empirical target from Validation S13 - not from a cited research paper.
      Rationale: a critic that produces no counter-evidence on majority of HIGH claims
      is not functioning adversarially; the 50% floor ensures meaningful challenge.
    enforcement_note: >
      MC3 is a STATISTICAL PROPERTY of the system, not a per-call runtime assertion.
      There is no in-library enforcement (e.g. no assert in multi_critic.py).
      Verification requires running Validation S13 against a live OpenAI endpoint.
      The runtime system cannot block a call because the 50% floor is a corpus-level metric.
    test: >
      Validation S13: count claims where result.counter_evidence_found == True.
      Assert count / total_high_consequence_claims >= 0.50.
      Run with OPENAI_API_KEY on ≥10 HIGH-consequence claims from a live session.

  - id: MC4
    enforcement: VALIDATION_ONLY
    description: >
      A claim that the generator validates (posterior ≥ 0.70) must produce
      a NEEDS_REVISION or DEFEATED verdict from the multi-critic on at least
      1 out of 3 test claims - demonstrating genuine cross-model disagreement.
    rationale: >
      Internal empirical target from Validation S13. The 1/3 threshold is deliberately
      conservative: it only requires that the critic is not an echo chamber; it does
      not require adversarial failure on every claim.
    enforcement_note: >
      MC4 is a STATISTICAL PROPERTY of the system, not a per-call runtime assertion.
      The library cannot enforce a corpus-level disagreement rate at call time.
      Verification requires running Validation S13 with OPENAI_API_KEY.
    test: >
      Validation S13: run multi-critic on 3 claims with posterior >= 0.70.
      Assert at least 1 verdict != "SURVIVES".
      Run with OPENAI_API_KEY; use real LLM critics (not the protocol fallback).

  - id: MC5
    description: >
      The critic call must complete in ≤ 30 seconds per claim (latency guard
      for production viability).
    test: >
      Validation S13: record time.time() before and after each critic call.
      Assert all elapsed times < 30.0 seconds.

  - id: MC6
    description: >
      The multi_critic module must be callable without breaking existing
      CHALLENGE phase callers - it must be additive, not a breaking change.
      build_challenge_result() still works unchanged for protocol-only mode.
    test: >
      Unit: import build_challenge_result from eif.challenge.protocol.
      Call it with counter_evidence=None. Assert result.self_evaluation_flag == True.
      (Old behavior preserved.)

# ─────────────────────────────────────────────────────────────────────────────
# IMPLEMENTATION
# ─────────────────────────────────────────────────────────────────────────────

implementation:
  new_file: "eif/eif/challenge/multi_critic.py"
  function: "run_multi_critic_challenge(claim_text, generator_model, posterior, api_key) → ChallengeResult"
  logic:
    step1: "Determine critic model: OPENAI_CRITIC_MODEL env var or adversarial-tagged default"
    step2: "Build adversarial system prompt: red-team role, no validation allowed, must find flaws"
    step3: "Call OpenAI API (or configured LLM) with the critic model + adversarial prompt"
    step4: "Parse response: extract counter_evidence list and competing_hypothesis (first-winner policy: first non-None hypothesis across critics is used; later hypotheses are dropped)"
    step5: "Call build_challenge_result() with critic_model='gpt-X-adversarial-critic' (includes 'adversarial' for diversity.py)"
    step6: "Return ChallengeResult with self_evaluation_flag=False, real counter_evidence"
  integration:
    - "challenge/__init__.py: export run_multi_critic_challenge"
    - "eif/eif/mcp_server/server.py: run_multi_critic_challenge() is called from within eif_challenge when OPENAI_API_KEY is present and counter_evidence is None (not a separate tool - integrated into eif_challenge for single-call UX). Intent originally planned eif_run_multi_critic as a separate tool; implementation chose to fold it into eif_challenge to reduce MCP tool surface area."

# ─────────────────────────────────────────────────────────────────────────────
# VALIDATION
# ─────────────────────────────────────────────────────────────────────────────

validation_note: "Validation scripts and evidence reports available on request via GitHub Discussions."
corpus_scenario: "S13"

constraint_satisfiability:
  conflicts_checked: "MC3 vs MC5 - adversarial LLM call takes time; 30s limit is generous for gpt-4.1-mini"
  tension: "MC4 (must produce disagreement) vs MC1 (must not be stub) - both resolved by actually calling LLM"
  resolution: "No conflicts. MC6 (backward compatibility) is purely additive - existing protocol path untouched."
