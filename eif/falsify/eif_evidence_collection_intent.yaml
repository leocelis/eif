intent_id: eif_evidence_collection_v1
version: "2.0"
status: implemented  # P0–P4 tier hierarchy fully implemented in evidence_collector.py; extended by eif_v4_evidence_collection_intent.yaml
created: "2026-05-07"
updated: "2026-05-10"

problem: |
  EIF's FALSIFY phase currently uses an LLM parametric probe (gpt-4.1-mini asking itself
  what evidence exists for a claim) as its sole evidence collection mechanism. This is:
    1. Circular: the evidence is generated by the same model family that produced the claim
    2. Ungrounded: parametric knowledge may be stale, hallucinated, or biased
    3. Spec-violating: tech_spec.md constraint 1 requires zero LLM calls in the engine
    4. Weakest possible evidence: CEBM Level 5 - equivalent to "expert opinion"

  The scientific method requires that evidence be independent of the hypothesis source
  (POPPER, ICML 2025). ReAct (ICLR 2023) demonstrates that tool observations - not
  model reasoning - are the correct evidence substrate.

solution: |
  Implement a five-tier evidence collection strategy, selected per-claim based on claim
  type and available tools. The EIF engine remains zero-LLM; evidence collection happens
  at the integration layer (validation scripts, MCP client, coordinator bridge).

  Priority order (runtime fall-through sequence in collect_evidence()):
    P0 HOST_TOOL       - delegate to the host agent's own registered tools (authoritative)
    P2 TOOL_OUTPUT     - capture multi-agent coordinator web_search_call results (free, zero
                         additional network cost; checked BEFORE P1 per intent C3/C9)
    P1 CODE_EXECUTION  - write and run Python against real data (numerical claims; runs after
                         P2 because coordinator outputs are preferred when already available)
    P3 WEB_SEARCH      - dedicated search query per claim (multi-source)
    P4 PARAMETRIC      - LLM probe (fallback only, explicit downgrade signal)

  P0 is the new highest tier. When the host agent registers tools (e.g., EHR query,
  database client, internal API), EIF delegates verification to those tools first because
  they have direct access to the authoritative data source. This is fundamentally stronger
  than any web search or code execution proxy.

  Private data firewall (new in v2.0):
    Claims about specific private entities (patient records, EHR, internal databases)
    MUST NOT fall through to web search. Web search returns population-level knowledge
    that falsely SUPPORTS absence claims ("Patient has no prior anthracycline exposure"
    → DDGS finds oncology literature saying some patients never had anthracyclines).
    If the claim is private-data AND no P0 host tool is available → INSUFFICIENT immediately.
    INSUFFICIENT on a GUESSED claim triggers a HALT, which is the correct behavior.

  The SPRT receives observations from whichever tier succeeded. A failed tier falls
  through to the next unless the private data firewall stops the chain. P4 produces
  an INSUFFICIENT signal, not False observations.

gap_discovered: |
  v1.0 validation against the S2 clinical trial scenario (eif_s2_clinical_trial_validation.py)
  revealed that P3 web search incorrectly returns SUPPORTS for patient-specific private claims.
  For "Patient has no prior anthracycline exposure", DDGS found oncology literature confirming
  that some patients have no anthracycline history - technically true at the population level
  but irrelevant to the specific patient being assessed. This produced a false SUPPORTS with
  posterior 0.8, preventing the expected HALT. Root cause: no mechanism to recognize that a
  claim references private data that web search fundamentally cannot verify. Fix: P0 tier +
  private data firewall.

research_basis:
  - paper: "POPPER: Automated Hypothesis Validation with Agentic Sequential Falsifications"
    ref: "arXiv:2502.09858, ICML 2025"
    finding: "LLM agents must design and execute falsification experiments; opining is insufficient"
  - paper: "FActScore: Fine-grained Atomic Evaluation of Factual Precision"
    ref: "arXiv:2305.14251, EMNLP 2023"
    finding: "Evidence must come from external knowledge source, not parametric LLM knowledge"
  - paper: "ReAct: Synergizing Reasoning and Acting in Language Models"
    ref: "arXiv:2210.03629, ICLR 2023"
    finding: "Tool observations (not model reasoning) are the correct evidence substrate"
  - paper: "Self-RAG: Learning to Retrieve, Generate and Critique through Self-Reflection"
    ref: "arXiv:2310.11511, ICLR 2024"
    finding: "Assess relevance [IsRel] before using retrieved evidence in belief update"
  - paper: "FactReview: Execution-Based Claim Verification"
    ref: "arXiv:2604.04074, 2025"
    finding: "Code execution is the strongest evidence for numerical/empirical claims"
  - paper: "FIRE: Fact-checking with Iterative Retrieval and Verification"
    ref: "arXiv:2411.00784, 2024"
    finding: "When confidence is insufficient, generate follow-up queries (SPRT CONTINUE → re-probe)"
  - paper: "VerifiAgent: Unified Verification with Tool-Based Adaptive Verification"
    ref: "arXiv:2504.00406, 2025"
    finding: "Agents autonomously select appropriate tools based on reasoning type - EIF adapts this
      by matching host tool capability_keywords to claim text without LLM routing"
  - paper: "NabaOS: Tool Receipts, Not Zero-Knowledge Proofs"
    ref: "arXiv:2603.10060, 2026"
    finding: "Epistemic classification of claims before evidence collection: private/fabricated vs.
      public/verifiable. Claims about specific private entities must be classified before
      attempting web search to avoid false population-level SUPPORTS verdicts"
  - paper: "ToolGate: Contract-Grounded and Verified Tool Execution for LLMs"
    ref: "arXiv:2601.04688, 2026"
    finding: "Hoare-style contracts with preconditions for each tool call. EIF implements the
      capability_keywords check as the precondition before delegating to a host tool"
  - paper: "Gorilla: Large Language Model Connected with Massive APIs"
    ref: "arXiv:2305.15334, NeurIPS 2024"
    finding: "Retrieval-based tool selection outperforms injecting full API descriptions.
      EIF uses keyword overlap (not LLM routing) to match claims to host tools - zero-LLM,
      deterministic, compatible with tech_spec.md C1"

tech_spec_alignment:
  - constraint: "Zero LLM calls - the engine never calls an LLM (tech_spec.md §1 C1)"
    alignment: "Evidence collection happens in the integration layer, not the EIF engine"
  - constraint: "Zero external network calls - pure local computation (tech_spec.md §1 C4)"
    alignment: "Network calls happen in the integration layer; engine receives list[bool] observations"
  - field: "FalsificationCondition.test_procedure (tech_spec.md §2.5)"
    alignment: "test_procedure now specifies the collection strategy: CODE_EXECUTION | TOOL_OUTPUT | WEB_SEARCH | PARAMETRIC"
  - field: "Claim.retrieved_at (tech_spec.md §2.1)"
    alignment: "Integration layer sets retrieved_at on every evidence collection call"
  - field: "eif_falsify.observations: list[bool] (tech_spec.md §3.3)"
    alignment: "Integration layer passes translated observations to the engine; engine never collects"

constraints:

  - id: C1
    title: Evidence must be independent of the hypothesis source
    description: |
      Evidence collected by any tier (P1–P3) must come from a source independent of
      the model that produced the claim. P4 (parametric probe) is non-independent and
      is capped at a weak signal. Three cases:
        (a) P4 + company-specific claim → [True, False] (neutral, no information).
        (b) P4 + general claim + confidence < 0.85 → [] (INSUFFICIENT, zero weight).
        (c) P4 + general claim + confidence ≥ 0.85 → [True, True, False] (SUPPORTS)
            or [False, False, True] (CONTRADICTS): weak 3-observation signal only.
      Case (c) is a deliberate relaxation for high-confidence encyclopedic facts
      (e.g. "HTTP uses port 80") where parametric knowledge is effectively ground truth.
    test: |
      (a) Call translate_to_observations("SUPPORTS", 0.9, P4, is_company_specific=True).
          Assert result == [True, False].
      (b) Call translate_to_observations("SUPPORTS", 0.7, P4, is_company_specific=False).
          Assert result == [].
      (c) Call translate_to_observations("SUPPORTS", 0.9, P4, is_company_specific=False).
          Assert result == [True, True, False] (len 3, not > 3).
    rationale: "FActScore §3.1: same-model verification is circular; relaxation for encyclopedic facts only"

  - id: C2
    title: Numerical claims must use CODE_EXECUTION when data is available
    description: |
      Any claim containing a specific number, percentage, or measurable threshold
      and for which a public data source exists must use CODE_EXECUTION (P1) as
      the primary evidence collection strategy.
      The code must be executed in a sandboxed environment with a time budget ≤ 30s.
    test: |
      Given claim text "SaaS churn rate is typically 5-7% annually", the strategy
      selector must return CODE_EXECUTION, write a Python snippet that queries a
      public dataset (e.g., SaaS benchmark data), execute it, and return a verdict.
      If no public data is accessible, fall through to P3.
    rationale: "FactReview arXiv:2604.04074: execution is deterministic, cannot be fabricated"

  - id: C3
    title: Coordinator tool outputs must be captured before any probe
    description: |
      When the multi-agent coordinator's tool_names includes any search/retrieval tool call,
      the integration layer MUST extract and pass those results as evidence before
      invoking any further evidence collection. This is P2 (TOOL_OUTPUT) and is free
      - the evidence was already collected by the coordinator.
    test: |
      Given sdk_result.new_items containing a tool_call_output_item from web_search_call,
      the evidence_collector must produce at least one observation from that output
      before falling through to P3 or P4.
    rationale: "ReAct arXiv:2210.03629: tool observations are the evidence"

  - id: C4
    title: Retrieved evidence must pass a relevance check before updating SPRT
    description: |
      Before translating a retrieved document or search result into SPRT observations,
      the integration layer must verify that the evidence is relevant to the specific
      claim being tested (Self-RAG [IsRel] equivalent). Irrelevant evidence must not
      generate any observations.
    test: |
      Given claim "FDA clearance for 510(k) takes 6-12 months on average" and a
      retrieved web page about EU MDR timelines, the relevance check must return
      False and the evidence must not contribute observations to the SPRT.
    rationale: "Self-RAG arXiv:2310.11511: irrelevant retrieval corrupts belief update"

  - id: C5
    title: INSUFFICIENT verdict must trigger up to 2 follow-up queries
    description: |
      When evidence collection returns INSUFFICIENT (equivalent to SPRT CONTINUE - 
      no decisive signal), the integration layer must generate a new, more specific
      search query targeting the remaining uncertainty and execute another evidence
      collection cycle. Maximum follow-up iterations: 2 (total 3 attempts per claim).
      Implementation note: the integration layer (eif_verify in server.py) checks
      evidence.verdict == "INSUFFICIENT" and retries with progressively narrowed
      queries ("empirical evidence peer-reviewed" on attempt 2; domain-term
      "systematic review statistics" on attempt 3).
    test: |
      Given claim "hospital sales cycle for AI diagnostic tools is 12-18 months"
      and collect_evidence() returning INSUFFICIENT on first probe,
      the eif_verify loop must issue a second attempt with a more specific
      falsification_condition (e.g. "empirical evidence peer-reviewed" appended)
      and feed its result as the evidence verdict. Total attempts ≤ 3.
    rationale: "FIRE arXiv:2411.00784: iterative retrieval based on remaining uncertainty"

  - id: C6
    title: Conflicting evidence must produce a neutral SPRT signal
    description: |
      When two or more retrieved sources contradict each other (one SUPPORTS, one
      CONTRADICTS the claim), the observation list must contain equal True and False
      entries. The SPRT must reflect epistemic conflict, not a biased average.
    test: |
      Given two web sources where source_A says "FDA De Novo takes 12 months"
      and source_B says "FDA De Novo takes 36 months", the evidence is conflicting.
      The SPRT observations must be [True, False], not [True, True].
    rationale: "AVeriTeC 2023: Conflicting Evidence/Cherry-picking is a distinct verdict"

  - id: C7
    title: Evidence provenance must be recorded per claim
    description: |
      Every claim that receives evidence collection must have:
        - retrieved_at: the timestamp of evidence collection
        - evidence_source: the URL, database name, or "CODE_EXECUTION" or "PARAMETRIC"
        - probe_tier: "P0_HOST_TOOL" | "P1_CODE_EXECUTION" | "P2_TOOL_OUTPUT" | "P3_WEB_SEARCH" | "P4_PARAMETRIC"
      This feeds DeepTRACE temporal currency (tech_spec.md §2.1, arXiv:2509.04499).
    test: |
      After evidence collection for any claim, the returned dict must contain
      "retrieved_at", "evidence_source", and "probe_tier" fields.
      retrieved_at must be within 5 seconds of the call timestamp.
    rationale: "DeepTRACE arXiv:2509.04499 dimension 8: temporal currency"

  - id: C8
    title: Parametric probe (P4) must emit INSUFFICIENT, not biased observations
    description: |
      When P4 (LLM parametric probe) is the only available evidence tier, the
      SPRT must receive [True, False] as its observations (neutral / CONTINUE signal),
      unless the probe confidence is ≥ 0.85 AND the claim is not company-specific.
      High-confidence, general claims may use a weak signal (2:1 True:False or 2:1 False:True).
    test: |
      For claim "our startup's valuation will be $50M pre-money" (company-specific),
      even if the parametric probe returns SUPPORTS at 0.9 confidence, the SPRT
      observations must be [True, False] - INSUFFICIENT.
      For claim "De Novo submissions typically take 9-12 months" at confidence 0.9,
      a weak positive signal [True, True, False] is acceptable.
    rationale: "FActScore: company-specific claims have no reliable external source"

  - id: C9
    title: Host tool delegation must precede all other tiers (P0)
    description: |
      When the host agent registers a HostToolRegistry with at least one tool whose
      capability_keywords overlap with the claim text or falsification_condition, EIF
      MUST invoke that tool first - before P1 code execution, before P2 coordinator
      outputs, before P3 web search. The host tool has authoritative access to the
      data source the claim references; all other tiers are proxies.
      Tool selection uses keyword overlap (Gorilla §3.2): no LLM routing needed.
      The falsification_condition string is used as the query, since it already
      encodes what evidence would contradict the claim.
    test: |
      Given a HostToolRegistry with tool "ehr_query" (capability_keywords=["patient",
      "anthracycline", "medication"]) and claim "Patient has no prior anthracycline
      exposure", collect_evidence() must call ehr_query(falsification_condition) and
      return P0_HOST_TOOL as the probe_tier - not P3_WEB_SEARCH.
    rationale: "VerifiAgent arXiv:2504.00406: authoritative data access > proxy evidence"

  - id: C10
    title: Private data claims must not fall through to web search (private data firewall)
    description: |
      Claims about specific private entities (named patients, individual customer records,
      internal proprietary databases) MUST NOT be passed to the P3 web search tier.
      Web search returns population-level knowledge that generates false SUPPORTS verdicts
      for absence claims about specific individuals (S2 clinical trial bug, validated
      2026-05-10 in eif_s2_clinical_trial_validation.py).
      Private data signals: "the patient has", "patient has no", "patient record", "ehr",
      "treatment history", "medication history", "prior exposure", "this patient", etc.
      Public registry override: if the claim also references a public registry (NCT, FDA,
      PubMed, ICD-10), it is NOT private - the registry part CAN be web-searched.
      Enforcement: if _is_private_data_claim() and no P0 tool available → INSUFFICIENT.
      INSUFFICIENT on a GUESSED claim triggers a HALT (correct behavior - the agent
      guessed something about private data it cannot access).
    test: |
      Given claim "Patient has no prior anthracycline exposure" (GUESSED) with no
      HostToolRegistry configured, collect_evidence() must return verdict=INSUFFICIENT,
      probe_tier=P0_HOST_TOOL, and must NOT call any web search function.
      The calling code (eif_verify) must then HALT because GUESSED + INSUFFICIENT.
    rationale: |
      NabaOS arXiv:2603.10060 §3.2: epistemic classification before evidence collection.
      Population-level SUPPORTS for individual-specific claims is a category error - the
      evidence is not about the same entity as the claim.

constraint_satisfiability:
  checked: true
  tensions:
    - C2 vs C5: "Code execution (C2) may not find data; C5 follow-up must handle this gracefully"
    - C4 vs C6: "Relevance check (C4) filters documents; C6 requires two contradicting relevant documents"
    - C9 vs C2: "Host tool (P0) runs first; for numerical claims a code template might also exist"
    - C10 vs C3: "Private data firewall stops web search; coordinator outputs (P2) might still exist"
  resolution: |
    C2 falls through to P3 if no public data accessible - no conflict.
    C4 and C6 are sequential: first check relevance, then check agreement among relevant docs.
    C8 is the explicit override for C1 - parametric is allowed as fallback but must be honest.
    C9 vs C2: P0 runs before P1. If P0 returns non-INSUFFICIENT, P1 is skipped entirely.
      If P0 returns INSUFFICIENT on a non-private claim, P1 is attempted as fallback.
    C10 vs C3: The private data firewall applies to P3 web search specifically. P2 coordinator
      tool outputs (already collected by the host) are still valid - the host had access.
      If P0 INSUFFICIENT + private + P2 outputs available → use P2 before halting.

verification_checklist:
  - "[ ] P0/C9: Host tool registered + claim matches capability_keywords → P0_HOST_TOOL probe_tier"
  - "[ ] P0/C9: Host tool CONTRADICTS claim (anthracycline found) → HALT fires"
  - "[ ] P0/C10: GUESSED private data claim, no host tool → INSUFFICIENT, NO web search call"
  - "[ ] P0/C10: GUESSED private data claim, no host tool → eif_verify returns HALT"
  - "[ ] P1: Given a numerical claim with public data, code runs and returns a verdict"
  - "[ ] P2: Given sdk_result with web_search_call, coordinator results feed SPRT before P3"
  - "[ ] P3: Given no coordinator search, dedicated web_search runs per claim"
  - "[ ] C4: Relevance check filters EU MDR results from FDA claim probe"
  - "[ ] C5: SPRT CONTINUE triggers a second query with different keywords"
  - "[ ] C6: Conflicting sources produce [True, False] in SPRT"
  - "[ ] C7: Every probed claim has retrieved_at + evidence_source + probe_tier"
  - "[ ] C8: Company-specific claim at P4 produces SPRT CONTINUE, not ACCEPT"

